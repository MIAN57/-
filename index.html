<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Supernatural Overlay</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: Consolas, monospace;
}

#ui {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 260px;
    padding: 14px;
    border-radius: 16px;
    background: rgba(30,10,60,0.45);
    backdrop-filter: blur(14px);
    box-shadow: 0 0 24px rgba(120,60,255,0.6);
    color: #d6b3ff;
    font-size: 12px;
    z-index: 20;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="ui">
    <h3>👁 灵能外挂 vMAX</h3>
    <div>FPS: <span id="fps">--</span></div>
    <div>目标: <span id="target">未锁定</span></div>
</div>

<canvas id="draw"></canvas>

<script>
const canvas = document.getElementById("draw");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.screen.width;
    canvas.height = window.screen.height;
}
resize();
window.addEventListener("resize", resize);

/* ===== 模拟玩家 ===== */
let players = [];

function drawSkeleton(p){
    ctx.strokeStyle = "#00ff88";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 12, 0, Math.PI*2);
    ctx.stroke();
}

function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    players.forEach(drawSkeleton);
    requestAnimationFrame(loop);
}
loop();

/* 测试：点屏幕生成目标 */
document.addEventListener("click", e=>{
    players.push({x:e.clientX, y:e.clientY});
});
</script>

</body>
</html>
